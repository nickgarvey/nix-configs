# Jabberwocky toolhead built-in filament sensor on nhk:gpio3.
# On runout the print auto-pauses (parks at back-right corner). Recover with
# LOAD_PLA / LOAD_ABS while paused, then RESUME.

[filament_switch_sensor extruder_sensor]
switch_pin: ^nhk:gpio3
pause_on_runout: True
event_delay: 0.1
pause_delay: 0.1
