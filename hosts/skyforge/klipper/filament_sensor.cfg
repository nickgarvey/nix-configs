# Jabberwocky toolhead built-in filament sensor on nhk:gpio3.
# pause_on_runout is off — runout state is exposed via Moonraker but no
# automatic action is taken, matching the conservative behaviour of the old
# Orbiter O2 sensor config.

[filament_switch_sensor extruder_sensor]
switch_pin: ^nhk:gpio3
pause_on_runout: False
event_delay: 0.1
pause_delay: 0.1
