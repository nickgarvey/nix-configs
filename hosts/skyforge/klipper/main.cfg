# This file contains common pin mappings for the Voron Leviathan V1.1
# To use this config, the firmware should be compiled for the STM32F446 with "No bootloader"
# Enable "extra low-level configuration options" and select the "12MHz crystal" as clock reference

# See docs/Config_Reference.md for a description of parameters.

## Voron Design VORON Trident 250/300/350mm Leviathan V1.1 config

[virtual_sdcard]
path: /var/lib/moonraker/gcodes       # Moonraker's unified data dir
on_error_gcode: CANCEL_PRINT          # G-code to execute on error (defined in CANCEL_PRINT macro)

[gcode_arcs]
resolution: 0.1                         # Arc interpolation resolution, handles G2/G3 commands

[exclude_object]                        # Exclude object for cancellation

[force_move]
enable_force_move: true                 # Enable force move feature

[include /etc/klipper/mainsail.cfg]
[include /etc/klipper/macros.cfg]
[include /etc/klipper/start.cfg]
[include /etc/klipper/nozzle_scruber.cfg]
[include /etc/klipper/filament_sensor.cfg]

[mcu]
##  Obtain definition by "ls -l /dev/serial/by-id/" then unplug to verify
##--------------------------------------------------------------------
serial: /dev/serial/by-id/usb-Klipper_stm32h743xx_30002D000B51323237363839-if00
restart_method: command

[mcu nhk]
##  Obtain definition by "ls -l /dev/serial/by-id/" then unplug to verify
##--------------------------------------------------------------------
serial: /dev/serial/by-id/usb-Klipper_rp2040_4E363334320E44C9-if00
restart_method: command

##--------------------------------------------------------------------

[printer]
kinematics: corexy
max_velocity: 200
max_accel: 3300
max_z_velocity: 15          #Max 15 for 12V TMC Drivers, can increase for 24V
max_z_accel: 350
square_corner_velocity: 5.0



#####################################################################
##	                 Temperature Monitoring
#####################################################################

[temperature_sensor NH36]
sensor_type: temperature_mcu
sensor_mcu: nhk
min_temp: 0
max_temp: 100

[temperature_sensor Leviathan]
sensor_type: temperature_mcu
sensor_mcu: mcu

[temperature_sensor Pi5]                # BTT-PI temperature sensor configuration
sensor_type: temperature_host           # Sensor type


#####################################################################
#   X/Y Stepper Settings
#####################################################################

##  B Stepper - Left
##  Connected to HV STEPPER 0
##  Endstop connected to X-ENDSTOP
[stepper_x]
step_pin: PB10
dir_pin: PB11
enable_pin: !PG0
microsteps: 32                        # Motor microsteps setting
rotation_distance: 40                 # Active pulley circumference mm (2GT-20T pulley 40, 2GT-16T pulley 32)
full_steps_per_rotation: 200          # Number of pulses required for a single motor revolution (1.8 degree motor: 200, 0.9 degree motor: 400)
endstop_pin: nhk:gpio10               # Limit switch PIN setting (X-)
position_min: 0
position_endstop: 350
position_max: 350
homing_speed: 35                     # Homing speed maximum 100
homing_retract_dist: 5                # Setback distance after the first trigger of the homing switch
homing_positive_dir: true             # Direction of homing (generally no change required)



##  Make sure to update below for your relevant driver (2209 or 5160)
[tmc5160 stepper_x]
cs_pin: PE15
spi_bus: spi4
interpolate: true                     # Enable 256 microstep interpolation
run_current: 1.5                      # Motor running current (mA)
hold_current: 1.5                     # Holding current (mA)

[stepper_x1]
step_pin: PD15
dir_pin: PD14
enable_pin: !PG2
microsteps: 32                        # Motor microsteps setting
rotation_distance: 40                 # Active pulley circumference mm (2GT-20T pulley 40, 2GT-16T pulley 32)
full_steps_per_rotation: 200          # Number of pulses required for a single motor revolution (1.8 degree motor: 200, 0.9 degree motor: 400)

[tmc5160 stepper_x1]
cs_pin: PB12
spi_bus: spi2
interpolate: true                     # Enable 256 microstep interpolation
run_current: 1.5                      # Motor running current (mA)
hold_current: 1.5                     # Holding current (mA)

##  A Stepper - Right
##  Connected to HV STEPPER 1
##  Endstop connected to Y-ENDSTOP
[stepper_y]
step_pin: PF15
dir_pin: PF14
enable_pin: !PE9
microsteps: 32                        # Motor microsteps setting
rotation_distance: 40                 # Active pulley circumference mm (2GT-20T pulley 40, 2GT-16T pulley 32)
full_steps_per_rotation: 200          # Number of pulses required for a single motor revolution (1.8 degree motor: 200, 0.9 degree motor: 400)
endstop_pin: PC2                      # Limit switch PIN setting (Y-)
position_min: 0                       # Y-axis minimum travel - software limit
position_endstop: 360               # Mechanical reset point coordinates for Y-axis (change to 350 for 350 models)
position_max: 360                   # Y-axis maximum travel - software limit (change to 350 for 350 models)
homing_speed: 35                     # Homing speed maximum 100
homing_retract_dist: 5                # Setback distance after the first trigger of the homing switch
homing_positive_dir: true             # Direction of homing (generally no change required)

##  Make sure to update below for your relevant driver (2209 or 5160)
[tmc5160 stepper_y]
cs_pin: PE11
spi_bus: spi4
interpolate: true                     # Enable 256 microstep interpolation
run_current: 1.5                      # Motor running current (mA)
hold_current: 1.5                     # Holding current (mA)

[stepper_y1]
step_pin: PG4
dir_pin: PE8
enable_pin: !PB0
microsteps: 32                        # Motor microsteps setting
rotation_distance: 40                 # Active pulley circumference mm (2GT-20T pulley 40, 2GT-16T pulley 32)
full_steps_per_rotation: 200          # Number of pulses required for a single motor revolution (1.8 degree motor: 200, 0.9 degree motor: 400)

[tmc5160 stepper_y1]
cs_pin: PG5
spi_bus: spi2
interpolate: true                     # Enable 256 microstep interpolation
run_current: 1.5                      # Motor running current (mA)
hold_current: 1.5                     # Holding current (mA)



#####################################################################
#   Z Stepper Settings
#####################################################################

## Z0 Stepper - Front Left
##  Connected to STEPPER 0
##  Endstop connected to Z-ENDSTOP
[stepper_z]
step_pin: PD4
dir_pin: PD3
enable_pin: !PD7
microsteps: 16                        # Motor microsteps setting
rotation_distance: 4                  # Active pulley circumference mm
endstop_pin: probe:z_virtual_endstop  # Limit switch PIN setting (Z0-)
position_max: 235                     # Z0-axis maximum travel - software limit
position_min: -5                    # Z0-axis minimum travel - software limit
homing_speed: 20                      # Homing speed
homing_retract_dist: 0                # Setback distance after the first trigger of the homing switch
homing_positive_dir: False            # Direction of homing (generally no change required)

##  Make sure to update below for your relevant driver (2209 or 5160)
[tmc2209 stepper_z]
uart_pin: PD5
interpolate: true                     # Enable 256 microstep interpolation
run_current: 0.8                      # Motor running current (mA)
hold_current: 0.8                     # Holding current (mA)


##  Z1 Stepper - Rear Center
##  Connected to STEPPER 1
[stepper_z1]
step_pin: PC12
dir_pin: PC11
enable_pin: !PD2
microsteps: 16                        # Motor microsteps setting
rotation_distance: 4                  # Active pulley circumference mm


##  Make sure to update below for your relevant driver (2209 or 5160)
[tmc2209 stepper_z1]
uart_pin: PD0
interpolate: true                     # Enable 256 microstep interpolation
run_current: 0.8                      # Motor running current (mA)
hold_current: 0.8                     # Holding current (mA)



##  Z2 Stepper - Front Right
##  Connected to STEPPER 2
[stepper_z2]
step_pin: PC9
dir_pin: PC8
enable_pin: !PC10
microsteps: 16                        # Motor microsteps setting
rotation_distance: 4                  # Active pulley circumference mm


##  Make sure to update below for your relevant driver (2209 or 5160)
[tmc2209 stepper_z2]
uart_pin: PA8
interpolate: true                     # Enable 256 microstep interpolation
run_current: 0.8                      # Motor running current (mA)
hold_current: 0.8                     # Holding current (mA)



#####################################################################
#   Extruder
#####################################################################

[extruder]
step_pin: nhk:gpio23
dir_pin: !nhk:gpio24
enable_pin: !nhk:gpio25
microsteps: 16
rotation_distance: 35.2												#Be sure to calibrate
gear_ratio: 44:8, 25:17
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: nhk:gpio9
sensor_type: PT1000
sensor_pin: nhk:gpio29
pullup_resistor: 2200
#control: pid                                                        # Do PID calibration after initial checks
#pid_Kp: 28.182
#pid_Ki: 1.978
#pid_Kd: 100.397
min_temp: 0
max_temp: 350
min_extrude_temp: 170
max_extrude_only_distance: 400
max_extrude_cross_section: 50
pressure_advance: 0.052                                             #Be sure to calibrate
pressure_advance_smooth_time: 0.040

[tmc2209 extruder]
sense_resistor: 0.100
uart_pin: nhk:gpio0
tx_pin: nhk:gpio1
interpolate: false
run_current: 0.45                        #.45 minimum offers 12N of force. DO NOT EXCEED .55A as it will cause excess heat.



#####################################################################
#   Bed Heater
#####################################################################

[heater_bed]
##  SSR Pin - HEATBED
##  Thermistor - TH1
heater_pin: PG11
## Check what thermistor type you have. See https://www.klipper3d.org/Config_Reference.html#common-thermistors for common thermistor types.
## Use "Generic 3950" for Keenovo heaters
sensor_type: ATC Semitec 104NT-4-R025H42G
sensor_pin: PA1
pullup_resistor: 2200
##  Adjust Max Power so your heater doesn't warp your bed. Rule of thumb is 0.4 watts / cm^2 .
max_power: 0.75
min_temp: 0
max_temp: 120
#control: pid
#pid_kp: 58.437
#pid_ki: 2.347
#pid_kd: 363.769

#####################################################################
# 	                 Cartographer V3 （ADXL345）
#####################################################################

[mcu cartographer] # See https://www.klipper3d.org/Config_Reference.html#mcu
serial: /dev/serial/by-id/usb-Cartographer_614e_2C003D001653584833373720-if00
restart_method: command # Not needed for probes using CAN.


# Cartographer V3 via the official cartographer3d-plugin (the new
# pip-distributed plugin — NOT the legacy cartographer-klipper loose-
# script repo). Section is [cartographer]; the plugin auto-creates a
# coil temperature sensor.
[cartographer]
mcu: cartographer
x_offset: 0
y_offset: 23
verbose: no

[bed_mesh]
zero_reference_position: 175,175
#    This option is suitable for the 350 model.
#    set this to the middle of your bed
speed: 300
#    movement speed of toolhead during bed mesh
horizontal_move_z: 5
#    height of scanner during bed mesh scan
mesh_min: 30, 30
#    start point of bed mesh [X, Y]
mesh_max: 320, 320
#    end point of bed mesh [X, Y]
probe_count: 30, 30
algorithm: bicubic

[adxl345]
cs_pin: cartographer:PA3 # For Cartographer V3
spi_bus: spi1

[resonance_tester]
accel_chip: adxl345
probe_points:
    175, 175, 20 # Fill out the blank with x and y coordinates where you want to run the resonance test.

####################################################################################
##                               Probe Calibration Macro
####################################################################################
[gcode_macro PROBECALIBRATE]
# Defines a G-code macro for probe calibration
gcode:
    G28                          # Home all axes
    G0 X175 Y175 Z1 F3600        # Fast move to X150 Y150 Z1 at 3600 mm/min
    PROBE_CALIBRATE              # Start probe calibration

#####################################################################
#   Fan Control
#####################################################################

[fan]               # 5015 Part cooling Blower
pin: nhk:gpio6
kick_start_time: .3
off_below: 0.1


[heater_fan hotend_fan]
pin: nhk:gpio5
tachometer_pin: nhk:gpio16
tachometer_ppr: 2
max_power: 1.0
kick_start_time: .1
heater: extruder
heater_temp: 50.0
fan_speed: .6


[controller_fan skirt_fan]      # Driver cooling fan
pin: PF3                         # Fan pin
cycle_time: 0.01                  # Cycle time
max_power: 1.0                   # Maximum power
shutdown_speed: 0.0              # Shutdown speed
fan_speed: 1.0                   # Fan speed when heater or stepper driver is active (0.0 to 1.0). Default is 1.0.
idle_timeout: 30                 # Time in seconds to keep the fan running after the stepper driver or heater is no longer active. Default is 30 seconds.
idle_speed: 0.4                  # Fan speed after the stepper driver is no longer active and before idle_timeout is reached (0.0 to 1.0). Default is fan_speed.
stepper: stepper_x               # Active motors

#####################################################################
#   LED Control
#####################################################################

[led caselight]
white_pin: PE6
cycle_time: 0.001
initial_white: 0.5

#####################################################################
#   Homing and Gantry Adjustment Routines
#####################################################################

[idle_timeout]
timeout: 1800

####################################################################################
##                                    Homing Override
####################################################################################

[homing_override]
# Smart homing: only home what was explicitly requested, plus implicit
# dependencies (X needs Y parked away from corner zone; Z needs both
# X and Y so the probe can position over zero_reference_position).
# Skip dependency homing if the axis is already homed.
#
# No klipper-side hard bounds for the corner-motor zone — print-area
# limits are enforced in the slicer.
axes: xyz
gcode:
    {% set homed = printer.toolhead.homed_axes %}
    {% set explicit_x = params.X is defined %}
    {% set explicit_y = params.Y is defined %}
    {% set explicit_z = params.Z is defined %}
    {% set no_axis_named = not (explicit_x or explicit_y or explicit_z) %}
    {% set want_x = explicit_x or no_axis_named %}
    {% set want_y = explicit_y or no_axis_named %}
    {% set want_z = explicit_z or no_axis_named %}
    {% set need_y = want_y or (want_x and 'y' not in homed) or (want_z and 'y' not in homed) %}
    {% set need_x = want_x or (want_z and 'x' not in homed) %}
    {% set need_z = want_z %}

    G90
    # Lift Z to clear bed. If Z isn't homed, fake its position (we don't
    # know where it really is) so G0 doesn't error. A real G28 Z below
    # will replace this with the true value.
    {% if 'z' not in homed %}
        SET_KINEMATIC_POSITION Z=0
    {% endif %}
    {% if printer.toolhead.position.z|float < 10 %}
        G0 Z10 F1200
    {% endif %}

    {% if need_y %}
        G28 Y
        G1 Y175 F7200
    {% endif %}
    {% if need_x %}
        G28 X
        G1 X175 Y175 F7200
    {% endif %}
    {% if need_z %}
        G28 Z
        G1 Z30
    {% endif %}

####################################################################################
##                                    Z Tilt Adjustment
####################################################################################

[z_tilt]
z_positions:
  -50, 18
  175, 398
  400, 18
points:
  30, 5
  175, 295
  320, 5

speed: 200
horizontal_move_z: 10
retries: 5
retry_tolerance: 0.0075

#####################################################################
#   Macros
#####################################################################

[gcode_macro G32]
gcode:
    SAVE_GCODE_STATE NAME=STATE_G32
    G90
    G28
    Z_TILT_ADJUST
    G28
        G0 X175 Y175 Z30 F3600
    #--------------------------------------------------------------------
    RESTORE_GCODE_STATE NAME=STATE_G32

[gcode_macro INPUT_SHAPER]
gcode:
   # Input Shaper Macro
   G28
   SHAPER_CALIBRATE
   # ...
   SAVE_CONFIG
