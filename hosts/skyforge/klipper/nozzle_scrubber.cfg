[gcode_macro CLEAN_NOZZLE]
# Coords in shifted klipper system. start_x/y = left end of wipe stroke,
# sweep goes +wipe_dist in X. Brush is mounted at back-left, past the
# bed's +Y edge.
variable_start_x: 30
variable_start_y: 320
variable_start_z: 0
variable_wipe_dist: 35
variable_wipe_qty: 15
variable_wipe_spd: 300
variable_raise_distance: 0

gcode:
 {% if "xyz" not in printer.toolhead.homed_axes %}
   G28
 {% endif %}
 
 G90                                            ; absolute positioning
 ## Move nozzle to start position
 G1 X{start_x} Y{start_y} F6000
 G1 Z{start_z} F1500

 ## Wipe nozzle
 {% for wipes in range(1, (wipe_qty + 1)) %}
   G1 X{start_x + wipe_dist} F{wipe_spd * 60}
   G1 X{start_x} F{wipe_spd * 60}
 {% endfor %}

 ## Raise nozzle
 G1 Z{raise_distance}